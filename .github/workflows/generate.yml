name: Génération du rapport

on:
  schedule:
    - cron: '*/30 * * * *'   # toutes les 30 minutes
  workflow_dispatch:           # bouton manuel
  push:
    branches: [main]           # déclenché à chaque push

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Installer les dépendances
        run: uv pip install -r requirements.txt --system

      - name: Créer config.py depuis les secrets
        run: |
          cat > config.py << 'EOF'
          import os
          SLACK_BOT_TOKEN        = os.environ.get("SLACK_BOT_TOKEN", "")
          SLACK_TEAM_ID          = "TB1T5DZFX"
          AIRTABLE_TOKEN         = os.environ.get("AIRTABLE_TOKEN", "")
          AIRTABLE_BASE_ID       = "appNb6Bh5KUwwmBXL"
          PRESTATAIRES_TOKEN     = os.environ.get("PRESTATAIRES_TOKEN", os.environ.get("AIRTABLE_TOKEN", ""))
          PRESTATAIRES_BASE_ID   = "appBQnpnbCXZkHnzS"
          PRESTATAIRES_TABLE_ID  = "tbl9Ut5t4NUA9hkoJ"
          REPORT_PATH            = "./public/index.html"
          CHANNEL_IDS  = {"achat_vente": "C011K41BHUZ", "logistique": "C07L1L861SA"}
          CHANNEL_NAMES = {"achat_vente": "achat_vente", "logistique": "logistique"}
          EOF

      - name: Créer le dossier public
        run: mkdir -p public

      - name: Générer le rapport
        env:
          SLACK_BOT_TOKEN:    ${{ secrets.SLACK_BOT_TOKEN }}
          AIRTABLE_TOKEN:     ${{ secrets.AIRTABLE_TOKEN }}
          PRESTATAIRES_TOKEN: ${{ secrets.PRESTATAIRES_TOKEN }}
        run: python generate_report.py

      - name: Déployer sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: false
